<!DOCTYPE html>
<html>
<head>
  <title>3D Heat City</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaec6cf);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(20, 20, 20);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

function createZone(x, z, color){

  const zone = new THREE.Mesh(
    new THREE.PlaneGeometry(6,6),
    new THREE.MeshStandardMaterial({
      color: color,
      side: THREE.DoubleSide
    })
  );

  zone.rotation.x = -Math.PI/2;
  zone.position.set(x, 0.01, z);

  scene.add(zone);
}

// RAYCAST
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
function createRoad(x, z, width, depth){

  const geometry = new THREE.BoxGeometry(width, 0.1, depth);

  const material = new THREE.MeshStandardMaterial({
    color: 0x333333
  });

  const road = new THREE.Mesh(geometry, material);

  road.position.set(x, 0.05, z);

  scene.add(road);
}

// Horizontal roads
for(let i=-10; i<=10; i+=6){
  createRoad(0, i, 50, 2);
}

// Vertical roads
for(let i=-10; i<=10; i+=6){
  createRoad(i, 0, 2, 50);
}

for(let i=-9;i<=9;i+=6){
  for(let j=-9;j<=9;j+=6){

    let color;

    const temp = Math.random()*10 + 28;

    if(temp > 35) color = 0xff0000;
    else if(temp > 30) color = 0xffa500;
    else color = 0x00ff00;

    createZone(i,j,color);
  }
}

// BUILDING FUNCTION
function createBuilding(x, z, height, heat){

  const geometry = new THREE.BoxGeometry(2, height, 2);

  let color = 0x00ff00; // cool
  if(heat > 35) color = 0xff0000;
  else if(heat > 30) color = 0xffa500;

  const material = new THREE.MeshStandardMaterial({color});
  const building = new THREE.Mesh(geometry, material);

  building.position.set(x, height/2, z);

  // store data
  building.userData = {
    heat: heat,
    reason: "Urban heat island",
    solution: "Add trees"
  };

  scene.add(building);
}



// 👇 ADD TREE FUNCTION HERE (NOT ABOVE, NOT RANDOM)
function createTree(x,z){

  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2,0.2,1),
    new THREE.MeshStandardMaterial({color:0x8b4513})
  );

  trunk.position.set(x,0.5,z);

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(0.8),
    new THREE.MeshStandardMaterial({color:0x228B22})
  );

  leaves.position.set(x,1.5,z);

  scene.add(trunk);
  scene.add(leaves);
}

// CREATE CITY GRID
for(let i=-10;i<=10;i+=3){
  for(let j=-10;j<=10;j+=3){

    const height = Math.random()*10 + 5;
    const heat = Math.random()*10 + 28;

    createBuilding(i,j,height,heat);
  }
}
// 🌳 ADD TREES AFTER BUILDINGS
for(let i=-10;i<=10;i+=4){
  for(let j=-10;j<=10;j+=4){

    if(Math.random() > 0.6){
      createTree(i,j);
    }

  }
}
// CLICK EVENT
window.addEventListener("click",(event)=>{

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse,camera);

  const intersects = raycaster.intersectObjects(scene.children);

  if(intersects.length > 0){

    const obj = intersects[0].object;

    if(obj.userData.heat){

      alert(
        "Heat: "+obj.userData.heat.toFixed(1)+" °C\n"+
        "Reason: "+obj.userData.reason+"\n"+
        "Solution: "+obj.userData.solution
      );
    }
  }
});

// ANIMATE
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
